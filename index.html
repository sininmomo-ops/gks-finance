  get: async (t,q="") => { const r=await fetch(`${SB}/rest/v1/${t}?${q}`,{headers:HDR}); if(!r.ok)throw new Error(await r.text()); return r.json(); },

function BarChart({labels,datasets,height=220}) {
  const ref = useRef(null); const cr = useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(cr.current) cr.current.destroy();
    cr.current = new Chart(ref.current,{type:"bar",data:{labels,datasets:datasets.map(d=>({...d,borderRadius:6,borderSkipped:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94a3b8",font:{size:12}}},tooltip:{mode:"index",intersect:false}},scales:{x:{ticks:{color:"#64748b",font:{size:11}},grid:{color:"#1e243840"}},y:{ticks:{color:"#64748b",font:{size:11},callback:v=>"Rp "+(v/1000000).toFixed(1)+"jt"},grid:{color:"#1e243840"}}}}});
    return ()=>{ if(cr.current) cr.current.destroy(); };
  },[labels,JSON.stringify(datasets)]);
  return <canvas ref={ref} style={{height:height+"px"}}/>;
}

function LineChart({labels,datasets,height=200}) {
  const ref = useRef(null); const cr = useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(cr.current) cr.current.destroy();
    cr.current = new Chart(ref.current,{type:"line",data:{labels,datasets:datasets.map(d=>({...d,tension:0.4,fill:true,pointRadius:4}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94a3b8",font:{size:12}}},tooltip:{mode:"index",intersect:false}},scales:{x:{ticks:{color:"#64748b",font:{size:11}},grid:{color:"#1e243840"}},y:{ticks:{color:"#64748b",font:{size:11},callback:v=>"Rp "+(v/1000000).toFixed(1)+"jt"},grid:{color:"#1e243840"}}}}});
    return ()=>{ if(cr.current) cr.current.destroy(); };
  },[labels,JSON.stringify(datasets)]);
  return <canvas ref={ref} style={{height:height+"px"}}/>;
}

function DoughnutChart({labels,data,colors,height=180}) {
  const ref = useRef(null); const cr = useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(cr.current) cr.current.destroy();
    cr.current = new Chart(ref.current,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:"#141720"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:"#94a3b8",font:{size:11},padding:12}}}}});
    return ()=>{ if(cr.current) cr.current.destroy(); };
  },[labels,JSON.stringify(data)]);
  return <canvas ref={ref} style={{height:height+"px"}}/>;
}

function exportExcel(data,filename,sheetName="Data") {
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
  XLSX.writeFile(wb,filename+".xlsx");
}

function ExportBtn({onExcel,onPDF}) {
  const [open,sOpen] = useState(false);
  return (
    <div style={{position:"relative",display:"inline-block"}}>
      <button className="btn btn-g" style={{fontSize:12}} onClick={()=>sOpen(!open)}>📤 Export ▾</button>
      {open&&<div style={{position:"absolute",right:0,top:36,background:"#141720",border:"1px solid #1e2438",borderRadius:10,padding:6,zIndex:99,minWidth:160,boxShadow:"0 8px 24px #0008"}}>
        <button onClick={()=>{onExcel();sOpen(false);}} style={{display:"block",width:"100%",textAlign:"left",padding:"9px 14px",background:"none",border:"none",color:"#e2e8f0",fontSize:13,cursor:"pointer"}}>📊 Excel</button>
        <button onClick={()=>{onPDF();sOpen(false);}} style={{display:"block",width:"100%",textAlign:"left",padding:"9px 14px",background:"none",border:"none",color:"#e2e8f0",fontSize:13,cursor:"pointer"}}>📄 PDF</button>
      </div>}
    </div>
  );
}

              <button onClick={()=>ss(!show)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#64748b"}}>{show?"🙈":"👁"}</button>

function App() {
  const [user,sUser]=useState(null);
  const [showLogout,sLogout]=useState(false);
  const [tab,sTab]=useState("dashboard");
  const [loading,sLoading]=useState(false);
  const [notif,sNotif]=useState(null);
  const [prods,sProds]=useState([]);
  const [invs,sInvs]=useState([]);
  const [cash,sCash]=useState([]);
  const [clients,sClients]=useState([]);
  const [moves,sMoves]=useState([]);

  // Invoice
  const [showIF,sIF]=useState(false);
  const [editInv,sEditInv]=useState(null);
  const [nInv,sNInv]=useState({client:"",clientId:"",due:"",items:[],status:"draft"});
  const [invItem,sII]=useState({productId:"",qty:1});
  const [selInv,sSelInv]=useState(null);
  const [fSt,sFSt]=useState("all");

  // Product
  const [showPF,sPF]=useState(false);
  const [editP,sEditP]=useState(null);
  const [nP,sNP]=useState({name:"",sku:"",category:"",stock:0,price:0,cost:0,min_stock:5});
  const [srch,sSrch]=useState("");

  // Client
  const [showCLF,sCLF]=useState(false);
  const [editCL,sEditCL]=useState(null);
  const [nCL,sNCL]=useState({name:"",phone:"",address:""});

  // Cash
  const [showCF,sCF]=useState(false);
  const [editCF,sEditCF]=useState(null);
  const [cfPer,sCFPer]=useState(new Date().toISOString().slice(0,7));
  const [cfType,sCFType]=useState("all");
  const [nCF,sNCF]=useState({date:"",description:"",category:"Operasional",type:"out",amount:0});

  // Stock movement
  const [showSM,sSM]=useState(false);
  const [smType,setSMType]=useState("in");
  const [nSM,sNSM]=useState({productId:"",qty:0,note:"",type:"in"});
  const [editSM,sEditSM]=useState(null);

  // Laporan
  const [lapPer,sLapPer]=useState(new Date().toISOString().slice(0,7));

  const notify=(msg,type="ok")=>{sNotif({msg,type});setTimeout(()=>sNotif(null),3000);};

  const loadAll=useCallback(async()=>{
    sLoading(true);
    try {
      const [p,i,c,cl,mv]=await Promise.all([
        api.get("products","order=name"),
        api.get("invoices","order=date.desc"),
        api.get("cash_entries","order=date.desc"),
        api.get("clients","order=name").catch(()=>[]),
        api.get("stock_movements","order=created_at.desc").catch(()=>[])
      ]);
      sProds(p||[]);
      sInvs((i||[]).map(x=>({...x,items:Array.isArray(x.items)?x.items:typeof x.items==="string"?JSON.parse(x.items):[]})));
      sCash(c||[]);
      sClients(cl||[]);
      sMoves(mv||[]);
    } catch(e){notify("Gagal memuat data!","err");}
    sLoading(false);
  },[]);

  useEffect(()=>{if(user)loadAll();},[user,loadAll]);

  const allCash=useMemo(()=>{
    const auto=invs.filter(i=>i.status==="paid").flatMap(inv=>{
      const t=tot(inv.items);
      const c=inv.items.reduce((s,it)=>{const p=prods.find(x=>x.id===it.productId);return s+(p?it.qty*p.cost:0);},0);
      return [
        {id:"CI-"+inv.id,date:inv.date,description:"Penerimaan: "+inv.client,category:"Penjualan",type:"in",amount:t,ref:inv.id,auto:true},
        {id:"CO-"+inv.id,date:inv.date,description:"HPP: "+inv.client,category:"Inventori",type:"out",amount:c,ref:inv.id,auto:true}
      ];
    });
    return [...auto,...cash.map(c=>({...c,auto:false}))].sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  },[invs,cash,prods]);

  const perCash=useMemo(()=>allCash.filter(c=>c.date&&c.date.startsWith(cfPer)),[allCash,cfPer]);
  const cashIn=perCash.filter(c=>c.type==="in").reduce((s,c)=>s+c.amount,0);
  const cashOut=perCash.filter(c=>c.type==="out").reduce((s,c)=>s+c.amount,0);
  const netCash=cashIn-cashOut;
  const months=[...new Set(allCash.filter(c=>c.date).map(c=>c.date.slice(0,7)))].sort().reverse();
  const rev=invs.filter(i=>i.status==="paid").reduce((s,i)=>s+tot(i.items),0);
  const cogs=invs.filter(i=>i.status==="paid").reduce((s,inv)=>s+inv.items.reduce((ss,it)=>{const p=prods.find(x=>x.id===it.productId);return ss+(p?it.qty*p.cost:0);},0),0);
  const gp=rev-cogs;
  const pend=invs.filter(i=>["pending","overdue"].includes(i.status)).reduce((s,i)=>s+tot(i.items),0);

  // CRUD
  const saveInv=async()=>{
    if(!nInv.client||nInv.items.length===0) return notify("Lengkapi klien & item!","err");
    try {
      if(editInv){
        await api.patch("invoices",editInv.id,{client:nInv.client,due:nInv.due,status:nInv.status,items:JSON.stringify(nInv.items)});
        notify("Invoice diperbarui!");
      } else {
        const id="INV-"+Date.now();
        const today=new Date().toISOString().split("T")[0];
        await api.post("invoices",{id,date:today,client:nInv.client,due:nInv.due,status:nInv.status,items:JSON.stringify(nInv.items)});
        if(nInv.status!=="draft") for(const it of nInv.items){const p=prods.find(x=>x.id===it.productId);if(p)await api.patch("products",p.id,{stock:Math.max(0,p.stock-it.qty)});}
        notify("Invoice dibuat!");
      }
      await loadAll(); sNInv({client:"",clientId:"",due:"",items:[],status:"draft"}); sEditInv(null); sIF(false);
    } catch(e){notify("Gagal: "+e.message,"err");}
  };

  const delInv=async(id)=>{
    if(!window.confirm('Hapus invoice ini?')) return;
    try{await api.del("invoices",id);await loadAll();notify("Invoice dihapus.");}catch(e){notify("Gagal!","err");}
  };

  const updIS=async(id,status)=>{
    const inv=invs.find(i=>i.id===id); const prev=inv.status;
    try {
      await api.patch("invoices",id,{status});
      if(status!=="draft"&&prev==="draft") for(const it of inv.items){const p=prods.find(x=>x.id===it.productId);if(p)await api.patch("products",p.id,{stock:Math.max(0,p.stock-it.qty)});}
      await loadAll(); notify("Status diperbarui!");
    } catch(e){notify("Gagal!","err");}
  };

  const saveProd=async()=>{
    if(!nP.name||!nP.sku) return notify("Nama & SKU wajib!","err");
    try {
      const {id:_,...data}=nP;
      if(editP) await api.patch("products",editP.id,data);
      else await api.post("products",data);
      await loadAll(); sNP({name:"",sku:"",category:"",stock:0,price:0,cost:0,min_stock:5}); sEditP(null); sPF(false); notify(editP?"Produk diperbarui!":"Produk ditambahkan!");
    } catch(e){notify("Gagal: "+e.message,"err");}
  };

  const delProd=async id=>{try{await api.del("products",id);await loadAll();notify("Dihapus.");}catch(e){notify("Gagal!","err");}};

  const saveCF=async()=>{
    if(!nCF.date||!nCF.description||nCF.amount<=0) return notify("Lengkapi semua field!","err");
    try {
      if(editCF){
        await api.patch("cash_entries",editCF.id,{date:nCF.date,description:nCF.description,category:nCF.category,type:nCF.type,amount:nCF.amount});
        notify("Entri diperbarui!");
      } else {
        await api.post("cash_entries",{id:"CF-"+Date.now(),date:nCF.date,description:nCF.description,category:nCF.category,type:nCF.type,amount:nCF.amount,ref:null});
        notify("Entri ditambahkan!");
      }
      await loadAll(); sNCF({date:"",description:"",category:"Operasional",type:"out",amount:0}); sEditCF(null); sCF(false);
    } catch(e){notify("Gagal: "+e.message,"err");}
  };

  const delCF=async id=>{try{await api.del("cash_entries",id);await loadAll();notify("Dihapus.");}catch(e){notify("Gagal!","err");}};

  const saveCL=async()=>{
    if(!nCL.name) return notify("Nama klien wajib!","err");
    try {
      if(editCL){
        await api.patch("clients",editCL.id,{name:nCL.name,phone:nCL.phone,address:nCL.address});
        notify("Klien diperbarui!");
      } else {
        await api.post("clients",{name:nCL.name,phone:nCL.phone,address:nCL.address});
        notify("Klien ditambahkan!");
      }
      await loadAll(); sNCL({name:"",phone:"",address:""}); sEditCL(null); sCLF(false);
    } catch(e){notify("Gagal: "+e.message,"err");}
  };

  const delCL=async id=>{try{await api.del("clients",id);await loadAll();notify("Klien dihapus.");}catch(e){notify("Gagal!","err");}};

  const saveStockMove=async()=>{
    if(!nSM.productId||nSM.qty<=0) return notify("Lengkapi produk & qty!","err");
    const prod=prods.find(x=>x.id===parseInt(nSM.productId)); if(!prod) return;
    try {
      if(editSM){
        let restored=prod.stock;
        if(editSM.type==="in") restored=prod.stock-editSM.qty;
        else if(editSM.type==="out") restored=prod.stock+editSM.qty;
        else restored=editSM.stock_before;
        let newStock=restored;
        if(nSM.type==="in") newStock=restored+parseInt(nSM.qty);
        else if(nSM.type==="out") newStock=Math.max(0,restored-parseInt(nSM.qty));
        else newStock=parseInt(nSM.qty);
        await api.patch("products",prod.id,{stock:Math.max(0,newStock)});
        await api.patch("stock_movements",editSM.id,{product_id:prod.id,product_name:prod.name,type:nSM.type,qty:parseInt(nSM.qty),stock_before:restored,stock_after:Math.max(0,newStock),note:nSM.note});
        notify("Riwayat diperbarui!");
      } else {
        let newStock=prod.stock;
        if(nSM.type==="in") newStock=prod.stock+parseInt(nSM.qty);
        else if(nSM.type==="out") newStock=Math.max(0,prod.stock-parseInt(nSM.qty));
        else newStock=parseInt(nSM.qty);
        await api.patch("products",prod.id,{stock:newStock});
        await api.post("stock_movements",{id:"SM-"+Date.now(),product_id:prod.id,product_name:prod.name,type:nSM.type,qty:parseInt(nSM.qty),stock_before:prod.stock,stock_after:newStock,note:nSM.note,date:new Date().toISOString().split("T")[0]}).catch(()=>{});
        notify(nSM.type==="in"?"Stok masuk!":nSM.type==="out"?"Stok keluar!":"Opname disimpan!");
      }
      await loadAll(); sNSM({productId:"",qty:0,note:"",type:"in"}); sEditSM(null); sSM(false);
    } catch(e){notify("Gagal: "+e.message,"err");}
  };

  const delStockMove=async(m)=>{
    try {
      const prod=prods.find(x=>x.id===m.product_id);
      if(prod){let r=prod.stock;if(m.type==="in")r=prod.stock-m.qty;else if(m.type==="out")r=prod.stock+m.qty;else r=m.stock_before;await api.patch("products",prod.id,{stock:Math.max(0,r)});}
      await api.del("stock_movements",m.id); await loadAll(); notify("Dihapus & stok dikembalikan.");
    } catch(e){notify("Gagal!","err");}
  };

  const addII=()=>{
    const p=prods.find(x=>x.id===parseInt(invItem.productId)); if(!p) return;
    sNInv(prev=>({...prev,items:[...prev.items,{productId:p.id,qty:parseInt(invItem.qty),price:p.price}]}));
    sII({productId:"",qty:1});
  };

  const printInv=(inv)=>{
    const rows=(inv.items||[]).map(it=>{const p=prods.find(x=>x.id===it.productId);return `<tr><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0">${p?p.name:"Produk"}</td><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;text-align:center">${it.qty}</td><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;text-align:right">${fmt(it.price)}</td><td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;text-align:right;color:#10b981;font-weight:700">${fmt(it.qty*it.price)}</td></tr>`;}).join("");
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Invoice ${inv.id}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Segoe UI,sans-serif;padding:40px;color:#1e293b}table{width:100%;border-collapse:collapse}th{background:#f1f5f9;padding:10px 12px;text-align:left;font-size:12px;color:#64748b}@media print{.np{display:none}}</style></head><body><div class="np" style="text-align:center;margin-bottom:20px"><button onclick="window.print()" style="background:#1e90ff;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-right:8px">Print / PDF</button><button onclick="window.close()" style="background:#f1f5f9;color:#64748b;border:none;padding:10px 18px;border-radius:8px;cursor:pointer">Tutup</button></div><div style="display:flex;justify-content:space-between;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid #e2e8f0"><div><div style="font-size:22px;font-weight:800;color:#1e90ff">💎 FinanceOS</div><div style="font-size:12px;color:#64748b">Global Karunia Supply</div></div><div style="text-align:right"><div style="font-size:24px;font-weight:800">INVOICE</div><div style="font-size:12px;color:#64748b">${inv.id}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px"><div style="background:#f8fafc;padding:14px;border-radius:8px"><div style="font-size:11px;color:#94a3b8;margin-bottom:4px">KEPADA</div><div style="font-weight:700;font-size:16px">${inv.client}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:#f8fafc;padding:12px;border-radius:8px"><div style="font-size:11px;color:#94a3b8;margin-bottom:4px">TGL INVOICE</div><div style="font-weight:600">${inv.date||"-"}</div></div><div style="background:#f8fafc;padding:12px;border-radius:8px"><div style="font-size:11px;color:#94a3b8;margin-bottom:4px">JATUH TEMPO</div><div style="font-weight:600">${inv.due||"-"}</div></div></div></div><table><thead><tr><th>Produk</th><th style="text-align:center">Qty</th><th style="text-align:right">Harga</th><th style="text-align:right">Subtotal</th></tr></thead><tbody>${rows}</tbody></table><div style="text-align:right;margin-top:16px;font-size:18px;font-weight:800;color:#10b981">Total: ${fmt(tot(inv.items))}</div></body></html>`;
    const w=window.open("","_blank","width=860,height=680"); w.document.write(html); w.document.close();
  };

  if(!user) return <Login onLogin={sUser}/>;

  const fInvs=invs.filter(i=>fSt==="all"||i.status===fSt);
  const fProds=prods.filter(p=>p.name.toLowerCase().includes(srch.toLowerCase())||p.sku.toLowerCase().includes(srch.toLowerCase()));
  const lapCash=allCash.filter(c=>c.date&&c.date.startsWith(lapPer));
  const lapInvs=invs.filter(i=>i.status==="paid"&&i.date&&i.date.startsWith(lapPer));
  const lapRev=lapInvs.reduce((s,i)=>s+tot(i.items),0);
  const lapHPP=lapInvs.reduce((s,inv)=>s+inv.items.reduce((ss,it)=>{const p=prods.find(x=>x.id===it.productId);return ss+(p?it.qty*p.cost:0);},0),0);
  const lapLK=lapRev-lapHPP;

        <div className="mbg" onClick={()=>sSelInv(null)}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
              <div><div style={{fontFamily:"JetBrains Mono",color:"#4facfe",fontSize:11,marginBottom:3}}>{selInv.id}</div><div style={{fontWeight:700,fontSize:16}}>{selInv.client}</div></div>
              <button className="btn btn-g" style={{height:32}} onClick={()=>sSelInv(null)}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <div style={{background:"#1a1d26",borderRadius:8,padding:10}}><div style={{fontSize:11,color:"#64748b",marginBottom:3}}>Tanggal</div><div style={{fontWeight:600}}>{selInv.date}</div></div>
              <div style={{background:"#1a1d26",borderRadius:8,padding:10}}><div style={{fontSize:11,color:"#64748b",marginBottom:3}}>Jatuh Tempo</div><div style={{fontWeight:600}}>{selInv.due||"-"}</div></div>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,marginBottom:14}}>
              <thead><tr style={{background:"#1a1d26"}}>{["Produk","Qty","Harga","Subtotal"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",color:"#64748b",fontSize:11}}>{h}</th>)}</tr></thead>
              <tbody>{(selInv.items||[]).map((it,i)=>{const p=prods.find(x=>x.id===it.productId);return<tr key={i} style={{borderBottom:"1px solid #1e2438"}}><td style={{padding:"8px 10px"}}>{p?p.name:"?"}</td><td style={{padding:"8px 10px",fontFamily:"JetBrains Mono"}}>{it.qty}</td><td style={{padding:"8px 10px",fontFamily:"JetBrains Mono"}}>{fmt(it.price)}</td><td style={{padding:"8px 10px",fontFamily:"JetBrains Mono",color:"#10b981",fontWeight:700}}>{fmt(it.qty*it.price)}</td></tr>;})}</tbody>
            </table>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <button className="btn btn-p" style={{fontSize:12}} onClick={()=>printInv(selInv)}>🖨️ Export PDF</button>
              <div style={{fontFamily:"JetBrains Mono",fontWeight:700,color:"#10b981",fontSize:16}}>Total: {fmt(tot(selInv.items))}</div>
            </div>
          </div>
        </div>
      )}

      {/* MODAL Buat Invoice */}
      {showIF&&(
        <div className="mbg" onClick={()=>sIF(false)}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>{editInv?"Edit Invoice":"Buat Invoice Baru"}</div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Klien</label>
              {clients.length>0?(
                <select className="inp" value={nInv.clientId} onChange={e=>{const cl=clients.find(x=>x.id===parseInt(e.target.value));sNInv(p=>({...p,clientId:e.target.value,client:cl?cl.name:""}))}}>
                  <option value="">Pilih klien...</option>
                  {clients.map(cl=><option key={cl.id} value={cl.id}>{cl.name}</option>)}
                </select>
              ):(
                <input className="inp" placeholder="Nama klien..." value={nInv.client} onChange={e=>sNInv(p=>({...p,client:e.target.value}))}/>
              )}
              {clients.length>0&&<input className="inp" style={{marginTop:6}} placeholder="Atau ketik manual..." value={nInv.client} onChange={e=>sNInv(p=>({...p,client:e.target.value,clientId:""}))}/>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Jatuh Tempo</label><input className="inp" type="date" value={nInv.due} onChange={e=>sNInv(p=>({...p,due:e.target.value}))}/></div>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Status</label>
                <select className="inp" value={nInv.status} onChange={e=>sNInv(p=>({...p,status:e.target.value}))}>
                  {Object.entries(SC).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
                </select>
              </div>
            </div>
            <div style={{background:"#1a1d26",borderRadius:10,padding:12,marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:600,marginBottom:8,color:"#94a3b8"}}>Tambah Item</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 70px auto",gap:8}}>
                <select className="inp" value={invItem.productId} onChange={e=>sII(p=>({...p,productId:e.target.value}))}>
                  <option value="">Pilih produk...</option>
                  {prods.map(p=><option key={p.id} value={p.id}>{p.name} (stok: {p.stock})</option>)}
                </select>
                <input className="inp" type="number" min="1" value={invItem.qty} onChange={e=>sII(p=>({...p,qty:e.target.value}))}/>
                <button className="btn btn-p" onClick={addII}>+</button>
              </div>
            </div>
            {nInv.items.length>0&&(
              <div style={{marginBottom:12}}>
                {nInv.items.map((it,i)=>{const p=prods.find(x=>x.id===it.productId);return<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:"#1a1d26",borderRadius:7,marginBottom:4,fontSize:12}}><span>{p?p.name:"?"}</span><span style={{color:"#64748b"}}>×{it.qty}</span><span style={{color:"#10b981",fontFamily:"JetBrains Mono"}}>{fmt(it.qty*it.price)}</span></div>;})}
                <div style={{textAlign:"right",fontWeight:700,fontFamily:"JetBrains Mono",color:"#10b981",marginTop:6}}>Total: {fmt(nInv.items.reduce((s,i)=>s+i.qty*i.price,0))}</div>
              </div>
            )}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button className="btn btn-g" onClick={()=>{sIF(false);sEditInv(null);}}>Batal</button>
              <button className="btn btn-p" onClick={saveInv}>{editInv?"Update":"Simpan"}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL Tambah/Edit Klien */}
      {showCLF&&(
        <div className="mbg" onClick={()=>{sCLF(false);sEditCL(null);}}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>{editCL?"Edit Klien":"Tambah Klien Baru"}</div>
            {[["Nama Klien *","name","text","PT / CV / Nama..."],["No. Telepon","phone","text","08..."],["Alamat","address","text","Jl. ..."]].map(([lb,f,t,ph])=>(
              <div key={f} style={{marginBottom:12}}>
                <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>{lb}</label>
                <input className="inp" type={t} placeholder={ph} value={nCL[f]} onChange={e=>sNCL(p=>({...p,[f]:e.target.value}))}/>
              </div>
            ))}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button className="btn btn-g" onClick={()=>{sCLF(false);sEditCL(null);}}>Batal</button>
              <button className="btn btn-p" onClick={saveCL}>{editCL?"Update":"Simpan"}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL Tambah Produk */}
      {showPF&&(
        <div className="mbg" onClick={()=>sPF(false)}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>{editP?"Edit Produk":"Tambah Produk"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              {[["Nama *","name","text","Nama produk..."],["SKU *","sku","text","Kode SKU..."],["Kategori","category","text","Elektronik..."],["Stok","stock","number","0"],["Min Stok","min_stock","number","5"],["Harga Jual","price","number","0"],["HPP","cost","number","0"]].map(([lb,f,t,ph])=>(
                <div key={f}>
                  <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>{lb}</label>
                  <input className="inp" type={t} placeholder={ph} value={nP[f]} onChange={e=>sNP(p=>({...p,[f]:t==="number"?parseInt(e.target.value)||0:e.target.value}))}/>
                </div>
              ))}
            </div>
            {nP.price>0&&nP.cost>0&&<div style={{background:"#10b98110",border:"1px solid #10b98120",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#10b981"}}>Margin: {((nP.price-nP.cost)/nP.price*100).toFixed(1)}% — Laba/unit: {fmt(nP.price-nP.cost)}</div>}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button className="btn btn-g" onClick={()=>sPF(false)}>Batal</button>
              <button className="btn btn-p" onClick={saveProd}>{editP?"Update":"Simpan"}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL Arus Kas */}
      {showCF&&(
        <div className="mbg" onClick={()=>{sCF(false);sEditCF(null);}}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>{editCF?"Edit Entri Arus Kas":"Tambah Entri Arus Kas"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Tanggal</label><input className="inp" type="date" value={nCF.date} onChange={e=>sNCF(p=>({...p,date:e.target.value}))}/></div>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Tipe</label>
                <select className="inp" value={nCF.type} onChange={e=>sNCF(p=>({...p,type:e.target.value}))}>
                  <option value="in">↑ Kas Masuk</option><option value="out">↓ Kas Keluar</option>
                </select>
              </div>
            </div>
            <div style={{marginBottom:12}}><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Keterangan</label><input className="inp" placeholder="Deskripsi..." value={nCF.description} onChange={e=>sNCF(p=>({...p,description:e.target.value}))}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Kategori</label>
                <select className="inp" value={nCF.category} onChange={e=>sNCF(p=>({...p,category:e.target.value}))}>
                  {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Jumlah (Rp)</label><input className="inp" type="number" min="0" value={nCF.amount||""} onChange={e=>sNCF(p=>({...p,amount:parseInt(e.target.value)||0}))}/></div>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button className="btn btn-g" onClick={()=>{sCF(false);sEditCF(null);}}>Batal</button>
              <button className="btn btn-p" onClick={saveCF}>{editCF?"Update":"Simpan"}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL Stok */}
      {showSM&&(
        <div className="mbg" onClick={()=>{sSM(false);sEditSM(null);}}>
          <div className="mod" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{editSM?"✏️ Edit Riwayat Stok":smType==="in"?"📥 Stok Masuk":smType==="out"?"📤 Stok Keluar":"📋 Stok Opname"}</div>
            <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>{smType==="in"?"Tambah stok masuk":smType==="out"?"Kurangi stok keluar":"Sesuaikan stok aktual"}</div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Pilih Produk</label>
              <select className="inp" value={nSM.productId} onChange={e=>sNSM(p=>({...p,productId:e.target.value}))}>
                <option value="">Pilih produk...</option>
                {prods.map(p=><option key={p.id} value={p.id}>{p.name} — Stok: {p.stock}</option>)}
              </select>
            </div>
            {nSM.productId&&<div style={{background:"#1a1d26",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12}}><span style={{color:"#64748b"}}>Stok saat ini: </span><span style={{fontFamily:"JetBrains Mono",fontWeight:700,color:"#4facfe",fontSize:14}}>{prods.find(x=>x.id===parseInt(nSM.productId))?.stock||0}</span></div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>{smType==="opname"?"Stok Aktual":"Jumlah"}</label><input className="inp" type="number" min="0" value={nSM.qty||""} onChange={e=>sNSM(p=>({...p,qty:parseInt(e.target.value)||0}))}/></div>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:5}}>Catatan</label><input className="inp" placeholder="Opsional..." value={nSM.note} onChange={e=>sNSM(p=>({...p,note:e.target.value}))}/></div>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button className="btn btn-g" onClick={()=>{sSM(false);sEditSM(null);}}>Batal</button>
              <button className="btn btn-p" onClick={saveStockMove}>Simpan</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
